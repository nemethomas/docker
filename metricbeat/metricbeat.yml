metricbeat.modules:
  - module: docker
    metricsets:
      - container
      - cpu
      - diskio
      - memory
      - network
    hosts: ["unix:///var/run/docker.sock"]
    period: 10s
    
  - module: system
    metricsets:
      - cpu
      - memory
      - network
      - filesystem
    period: 10s

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  
setup.kibana:
  host: "kibana:5601"

setup.dashboards.enabled: true
